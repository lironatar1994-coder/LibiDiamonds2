<svg xmlns="http://www.w3.org/2000/svg" width="941" height="1672" viewBox="0 0 941 1672">
  <defs>
    <clipPath id="stone-mask">
      <ellipse cx="470" cy="560" rx="108" ry="116"/>
    </clipPath>
    <linearGradient id="facet-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.36" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.46" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="0.51" stop-color="#fff" stop-opacity="0.96"/>
      <stop offset="0.57" stop-color="#fff" stop-opacity="0.24"/>
      <stop offset="0.69" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>
  <g clip-path="url(#stone-mask)" filter="url(#soft-light)">
    <rect x="330" y="420" width="280" height="280" fill="url(#facet-light)" transform="rotate(-18 470 560)"/>
